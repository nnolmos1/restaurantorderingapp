<!DOCTYPE html>
<meta charset="utf-8">
<html>
    <head>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Smythe&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
       <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <header>
                <div class="head-container">
                    <h1> Herobrine's Diner</h1>
                    <h2> The best burgers and pizza in town.</h2>
                </div>
            </header>

            <main>
                <section id="menu-container">
                    
                </section>

                <section id="order-container">

                </section>
            </main>
            <div class="card-modal" id="card-modal">
                <p style="font-size: 24px;">Enter card details</p>
                <form id="payment-form">
                    <input type="text" placeholder="Enter your name" id="card-name" required>
                    <input type="text" placeholder="Enter card number" required>
                    <input type="text" placeholder="Enter CVV" required> 
                    <button type="submit" id="pay-btn">Pay</button>
                </form>
            </div>

            <div class="thanks-msg" id="thanks-msg">
                <p>Thanks, <span id="user-name"></span>! Your order is on its way!</p>
            </div>




        </div>
	<script src="index.js" type="module"></script>
    </body>
</html>
